# git-cliff configuration for changelog generation
# https://git-cliff.org/docs/configuration

[changelog]
# Changelog header
header = """
# Changelog

All notable changes to the Mycelix Living Protocol will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""

# Template for the changelog body
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\

{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
            {{ commit.message | upper_first }}\
            {% if commit.github.pr_number %} ([#{{ commit.github.pr_number }}](https://github.com/mycelix/mycelix-v6-living/pull/{{ commit.github.pr_number }})){% endif %}\
            {% if commit.github.username %} by @{{ commit.github.username }}{% endif %}
    {% endfor %}
{% endfor %}\n
"""

# Template for changelog footer
footer = """
{% for release in releases -%}
    {% if release.version -%}
        {% if release.previous.version -%}
            [{{ release.version | trim_start_matches(pat="v") }}]: \
                https://github.com/mycelix/mycelix-v6-living/compare/{{ release.previous.version }}...{{ release.version }}
        {% endif -%}
    {% else -%}
        [unreleased]: https://github.com/mycelix/mycelix-v6-living/compare/{{ release.previous.version }}...HEAD
    {% endif -%}
{% endfor %}
"""

# Remove leading and trailing whitespace
trim = true

# Postprocessors
postprocessors = [
    # Replace issue references
    { pattern = '\((\w+\s)?#(\d+)\)', replace = "([#${2}](https://github.com/mycelix/mycelix-v6-living/issues/${2}))" },
]

[git]
# Parse conventional commits
conventional_commits = true

# Filter out commits by regex
filter_unconventional = true

# Process commits that start with these prefixes
split_commits = false

# Regex for preprocessing commit messages
commit_preprocessors = [
    # Remove issue numbers from commit titles for cleaner changelog
    { pattern = '\((\w+\s)?#(\d+)\)', replace = "" },
]

# Regex for parsing and grouping commits
commit_parsers = [
    # Skip these commits
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore\\(deps\\)", skip = true },
    { message = "^chore\\(pr\\)", skip = true },
    { message = "^chore\\(pull\\)", skip = true },
    { message = "^chore\\(merge\\)", skip = true },
    { message = "^Merge", skip = true },

    # Features
    { message = "^feat", group = "<!-- 0 -->Features" },
    { message = "^add", group = "<!-- 0 -->Features" },

    # Bug Fixes
    { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
    { message = "^bug", group = "<!-- 1 -->Bug Fixes" },

    # Performance
    { message = "^perf", group = "<!-- 2 -->Performance" },

    # Refactoring
    { message = "^refactor", group = "<!-- 3 -->Refactoring" },

    # Documentation
    { message = "^doc", group = "<!-- 4 -->Documentation" },

    # Testing
    { message = "^test", group = "<!-- 5 -->Testing" },

    # Styling
    { message = "^style", group = "<!-- 6 -->Styling" },

    # CI/CD
    { message = "^ci", group = "<!-- 7 -->CI/CD" },

    # Build
    { message = "^build", group = "<!-- 8 -->Build" },

    # Deprecation
    { message = "^deprecate", group = "<!-- 9 -->Deprecated" },

    # Removal
    { message = "^remove", group = "<!-- 10 -->Removed" },
    { message = "^revert", group = "<!-- 10 -->Removed" },

    # Security
    { message = "^security", group = "<!-- 11 -->Security" },

    # Breaking changes (marked with !)
    { message = "^.*!", group = "<!-- 12 -->Breaking Changes" },

    # Chore (other maintenance)
    { message = "^chore", group = "<!-- 13 -->Miscellaneous" },

    # Catch-all
    { body = ".*", group = "<!-- 99 -->Other" },
]

# Protect breaking changes from being skipped
protect_breaking_commits = true

# Filter by tags
filter_commits = false

# Tag pattern
tag_pattern = "v[0-9].*"

# Skip tags matching pattern
# skip_tags = ""

# Ignore tags matching pattern
# ignore_tags = ""

# Sort commits by date (newest first)
topo_order = false

# Sort order
sort_commits = "newest"

# Limit commits
# limit_commits = 42

[remote.github]
owner = "mycelix"
repo = "mycelix-v6-living"
