apiVersion: v1
kind: Service
metadata:
  name: {{ include "mycelix-ws-server.fullname" . }}
  labels:
    {{- include "mycelix-ws-server.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: websocket
      port: {{ .Values.service.port }}
      targetPort: websocket
      protocol: TCP
    - name: health
      port: {{ .Values.service.healthPort }}
      targetPort: health
      protocol: TCP
  selector:
    {{- include "mycelix-ws-server.selectorLabels" . | nindent 4 }}
---
# Headless service for direct pod addressing
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mycelix-ws-server.fullname" . }}-headless
  labels:
    {{- include "mycelix-ws-server.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: websocket
      port: {{ .Values.service.port }}
      targetPort: websocket
      protocol: TCP
  selector:
    {{- include "mycelix-ws-server.selectorLabels" . | nindent 4 }}
