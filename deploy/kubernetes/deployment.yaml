# Mycelix WebSocket Server - Kubernetes Deployment
# Provides lifecycle hooks, health checks, and resource limits for production use
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mycelix-ws-server
  labels:
    app: mycelix-ws-server
    app.kubernetes.io/name: mycelix-ws-server
    app.kubernetes.io/component: websocket
    app.kubernetes.io/part-of: mycelix
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mycelix-ws-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: mycelix-ws-server
        app.kubernetes.io/name: mycelix-ws-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8889"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: mycelix-ws-server
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: ws-server
          image: mycelix/ws-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: websocket
              containerPort: 8888
              protocol: TCP
            - name: health
              containerPort: 8889
              protocol: TCP
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8888"
            - name: HEALTH_PORT
              value: "8889"
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: mycelix-ws-server-config
                  key: log_level
            - name: RUST_LOG
              valueFrom:
                configMapKeyRef:
                  name: mycelix-ws-server-config
                  key: rust_log
            - name: BROADCAST_CAPACITY
              valueFrom:
                configMapKeyRef:
                  name: mycelix-ws-server-config
                  key: broadcast_capacity
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - mycelix-ws-server
                topologyKey: kubernetes.io/hostname
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mycelix-ws-server
  labels:
    app: mycelix-ws-server
