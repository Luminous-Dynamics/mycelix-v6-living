# Mycelix WebSocket Server - Horizontal Pod Autoscaler
# Scales based on CPU utilization and custom metrics (connections)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mycelix-ws-server
  labels:
    app: mycelix-ws-server
    app.kubernetes.io/name: mycelix-ws-server
    app.kubernetes.io/component: websocket
    app.kubernetes.io/part-of: mycelix
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mycelix-ws-server
  minReplicas: 2
  maxReplicas: 10
  metrics:
    # Scale based on CPU utilization
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # Scale based on memory utilization
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    # Scale based on active connections (requires Prometheus Adapter)
    # Uncomment when prometheus-adapter is configured
    # - type: Pods
    #   pods:
    #     metric:
    #       name: mycelix_active_connections
    #     target:
    #       type: AverageValue
    #       averageValue: "500"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 2
          periodSeconds: 15
      selectPolicy: Max
---
# PodDisruptionBudget for high availability during node maintenance
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mycelix-ws-server
  labels:
    app: mycelix-ws-server
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: mycelix-ws-server
