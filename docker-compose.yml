# =============================================================================
# Mycelix Living Protocol - Docker Compose
# =============================================================================
#
# Usage:
#   docker-compose up -d          # Start in background
#   docker-compose logs -f        # Follow logs
#   docker-compose down           # Stop
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # WebSocket RPC Server
  # ---------------------------------------------------------------------------
  ws-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8888:8888"   # WebSocket RPC
      - "8889:8889"   # Health/Metrics HTTP
    environment:
      - HOST=0.0.0.0
      - PORT=8888
      - LOG_LEVEL=info
      - RUST_LOG=ws_server=info,cycle_engine=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8889/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Development Server (with simulated time)
  # ---------------------------------------------------------------------------
  ws-server-dev:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9888:8888"
      - "9889:8889"
    environment:
      - LOG_LEVEL=debug
      - RUST_LOG=ws_server=debug,cycle_engine=debug
    command: ["--host", "0.0.0.0", "--port", "8888", "--simulated-time", "--time-acceleration", "100"]
    profiles:
      - dev
