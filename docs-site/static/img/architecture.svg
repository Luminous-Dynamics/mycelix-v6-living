<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dawnGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="surgeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="settleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="restGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#0f0f1a" />

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="white" font-family="system-ui" font-size="24" font-weight="bold">
    Mycelix Architecture
  </text>

  <!-- Cycle indicator -->
  <g transform="translate(400, 120)">
    <circle cx="0" cy="0" r="50" fill="none" stroke="#333" stroke-width="8" />
    <!-- Phase arcs -->
    <path d="M 0 -50 A 50 50 0 0 1 50 0" fill="none" stroke="url(#dawnGradient)" stroke-width="8" stroke-linecap="round" />
    <path d="M 50 0 A 50 50 0 0 1 0 50" fill="none" stroke="url(#surgeGradient)" stroke-width="8" stroke-linecap="round" />
    <path d="M 0 50 A 50 50 0 0 1 -50 0" fill="none" stroke="url(#settleGradient)" stroke-width="8" stroke-linecap="round" />
    <path d="M -50 0 A 50 50 0 0 1 0 -50" fill="none" stroke="url(#restGradient)" stroke-width="8" stroke-linecap="round" />

    <!-- Phase labels -->
    <text x="0" y="-65" text-anchor="middle" fill="#fbbf24" font-size="12">Dawn</text>
    <text x="65" y="5" text-anchor="start" fill="#ef4444" font-size="12">Surge</text>
    <text x="0" y="75" text-anchor="middle" fill="#3b82f6" font-size="12">Settle</text>
    <text x="-65" y="5" text-anchor="end" fill="#8b5cf6" font-size="12">Rest</text>

    <!-- Center -->
    <text x="0" y="5" text-anchor="middle" fill="white" font-size="14" font-weight="bold">28</text>
    <text x="0" y="18" text-anchor="middle" fill="#666" font-size="10">days</text>
  </g>

  <!-- Nodes layer -->
  <g transform="translate(0, 200)">
    <!-- Node boxes -->
    <g transform="translate(100, 80)">
      <rect x="0" y="0" width="120" height="80" rx="8" fill="#1a1a2e" stroke="url(#nodeGradient)" stroke-width="2" />
      <text x="60" y="30" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Node 1</text>
      <text x="60" y="50" text-anchor="middle" fill="#a78bfa" font-size="12">Primitives</text>
      <text x="60" y="68" text-anchor="middle" fill="#666" font-size="10">Pulse, Thread, Stream</text>
    </g>

    <g transform="translate(280, 80)">
      <rect x="0" y="0" width="120" height="80" rx="8" fill="#1a1a2e" stroke="url(#nodeGradient)" stroke-width="2" />
      <text x="60" y="30" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Node 2</text>
      <text x="60" y="50" text-anchor="middle" fill="#a78bfa" font-size="12">Primitives</text>
      <text x="60" y="68" text-anchor="middle" fill="#666" font-size="10">Bloom, Spore, Gate</text>
    </g>

    <g transform="translate(460, 80)">
      <rect x="0" y="0" width="120" height="80" rx="8" fill="#1a1a2e" stroke="url(#nodeGradient)" stroke-width="2" />
      <text x="60" y="30" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Node 3</text>
      <text x="60" y="50" text-anchor="middle" fill="#a78bfa" font-size="12">Primitives</text>
      <text x="60" y="68" text-anchor="middle" fill="#666" font-size="10">Sense, Dream, Wake</text>
    </g>

    <g transform="translate(640, 80)">
      <rect x="0" y="0" width="120" height="80" rx="8" fill="#1a1a2e" stroke="url(#nodeGradient)" stroke-width="2" />
      <text x="60" y="30" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Node N</text>
      <text x="60" y="50" text-anchor="middle" fill="#a78bfa" font-size="12">Primitives</text>
      <text x="60" y="68" text-anchor="middle" fill="#666" font-size="10">...</text>
    </g>

    <!-- Connections -->
    <g stroke="url(#nodeGradient)" stroke-width="2" fill="none" stroke-dasharray="5,5" opacity="0.5">
      <line x1="220" y1="120" x2="280" y2="120" />
      <line x1="400" y1="120" x2="460" y2="120" />
      <line x1="580" y1="120" x2="640" y2="120" />
    </g>
  </g>

  <!-- Storage layer -->
  <g transform="translate(0, 380)">
    <rect x="100" y="0" width="200" height="60" rx="8" fill="#1a1a2e" stroke="#666" stroke-width="1" />
    <text x="200" y="25" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Root Storage</text>
    <text x="200" y="45" text-anchor="middle" fill="#666" font-size="10">Local, fast</text>

    <rect x="320" y="0" width="200" height="60" rx="8" fill="#1a1a2e" stroke="#666" stroke-width="1" />
    <text x="420" y="25" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Mycelium Storage</text>
    <text x="420" y="45" text-anchor="middle" fill="#666" font-size="10">Distributed, replicated</text>

    <rect x="540" y="0" width="200" height="60" rx="8" fill="#1a1a2e" stroke="#666" stroke-width="1" />
    <text x="640" y="25" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Archive Storage</text>
    <text x="640" y="45" text-anchor="middle" fill="#666" font-size="10">Cold, compressed</text>
  </g>

  <!-- API layer -->
  <g transform="translate(100, 460)">
    <rect x="0" y="0" width="150" height="30" rx="4" fill="#3b82f6" />
    <text x="75" y="20" text-anchor="middle" fill="white" font-size="12" font-weight="bold">WebSocket</text>

    <rect x="170" y="0" width="150" height="30" rx="4" fill="#10b981" />
    <text x="245" y="20" text-anchor="middle" fill="white" font-size="12" font-weight="bold">REST API</text>

    <rect x="340" y="0" width="150" height="30" rx="4" fill="#f59e0b" />
    <text x="415" y="20" text-anchor="middle" fill="white" font-size="12" font-weight="bold">GraphQL</text>

    <rect x="510" y="0" width="150" height="30" rx="4" fill="#8b5cf6" />
    <text x="585" y="20" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Metrics</text>
  </g>
</svg>
