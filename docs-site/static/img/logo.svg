<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="mycelixGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Central node -->
  <circle cx="50" cy="50" r="12" fill="url(#mycelixGradient)" />

  <!-- Mycelial threads -->
  <g stroke="url(#mycelixGradient)" stroke-width="2" fill="none" stroke-linecap="round">
    <!-- Top branch -->
    <path d="M50 38 Q50 25 40 15" />
    <path d="M50 38 Q55 28 65 20" />

    <!-- Right branch -->
    <path d="M62 50 Q75 50 85 40" />
    <path d="M62 50 Q72 55 80 65" />

    <!-- Bottom branch -->
    <path d="M50 62 Q50 75 60 85" />
    <path d="M50 62 Q45 72 35 80" />

    <!-- Left branch -->
    <path d="M38 50 Q25 50 15 60" />
    <path d="M38 50 Q28 45 20 35" />
  </g>

  <!-- Outer nodes -->
  <g fill="url(#mycelixGradient)">
    <circle cx="40" cy="15" r="4" opacity="0.8" />
    <circle cx="65" cy="20" r="3" opacity="0.6" />
    <circle cx="85" cy="40" r="4" opacity="0.8" />
    <circle cx="80" cy="65" r="3" opacity="0.6" />
    <circle cx="60" cy="85" r="4" opacity="0.8" />
    <circle cx="35" cy="80" r="3" opacity="0.6" />
    <circle cx="15" cy="60" r="4" opacity="0.8" />
    <circle cx="20" cy="35" r="3" opacity="0.6" />
  </g>

  <!-- Inner glow -->
  <circle cx="50" cy="50" r="8" fill="white" opacity="0.3" />
</svg>
