[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc = "0.8.20"
optimizer = true
optimizer_runs = 200

[profile.default.fuzz]
runs = 256

# Halmos profile for formal verification with extended fuzz testing
[profile.halmos]
src = "contracts"
out = "out"
libs = ["lib"]
solc = "0.8.20"
optimizer = true
optimizer_runs = 200

[profile.halmos.fuzz]
runs = 10000
max_test_rejects = 100000

[profile.halmos.invariant]
runs = 1000
depth = 50

# CI profile for quick verification
[profile.ci]
src = "contracts"
out = "out"
libs = ["lib"]
solc = "0.8.20"

[profile.ci.fuzz]
runs = 1000
